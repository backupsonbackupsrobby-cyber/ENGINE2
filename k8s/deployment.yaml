---
# Kubernetes Deployment - ENGINE production
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-tenetai
  namespace: engine
  labels:
    app: engine
    service: tenetaiagency-101
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: engine
      service: tenetaiagency-101
  template:
    metadata:
      labels:
        app: engine
        service: tenetaiagency-101
      annotations:
        satellite-verified: "true"
        xyo-location: "encrypted"
    spec:
      serviceAccountName: engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: tenetaiagency-101
        image: dhi.io/python:3.13-alpine3.22
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: SERVICE_NAME
          value: "tenetaiagency-101"
        - name: LOG_LEVEL
          value: "INFO"
        - name: VAULT_ADDR
          value: "http://vault:8200"
        - name: PROMETHEUS_PUSHGATEWAY
          value: "http://prometheus-pushgateway:9091"
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: secrets
          mountPath: /etc/secrets
          readOnly: true
        - name: config
          mountPath: /etc/config
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
      volumes:
      - name: secrets
        secret:
          secretName: engine-secrets
          defaultMode: 0400
      - name: config
        configMap:
          name: engine-config
          defaultMode: 0444
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: service
                  operator: In
                  values:
                  - tenetaiagency-101
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: engine-tenetai
  namespace: engine
  labels:
    app: engine
    service: tenetaiagency-101
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: engine
    service: tenetaiagency-101
  sessionAffinity: ClientIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: engine-tenetai-hpa
  namespace: engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: engine-tenetai
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: engine-tenetai-pdb
  namespace: engine
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: engine
      service: tenetaiagency-101
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: engine-tenetai
  namespace: engine
spec:
  selector:
    matchLabels:
      app: engine
      service: tenetaiagency-101
  endpoints:
  - port: http
    interval: 30s
    path: /metrics
