---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: engine
  labels:
    name: engine

---
# ConfigMap for application config
apiVersion: v1
kind: ConfigMap
metadata:
  name: engine-config
  namespace: engine
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  SERVICE_MESH: "enabled"
  TRACING_ENABLED: "true"
  METRICS_ENABLED: "true"

---
# Secret for database credentials (base64 encoded)
apiVersion: v1
kind: Secret
metadata:
  name: engine-db-secret
  namespace: engine
type: Opaque
stringData:
  db-user: engine_user
  db-password: ChangeMeInProduction!
  db-name: engine_prod
  db-url: "postgresql://engine_user:ChangeMeInProduction!@postgres.engine.svc.cluster.local:5432/engine_prod"

---
# Secret for Redis credentials
apiVersion: v1
kind: Secret
metadata:
  name: engine-redis-secret
  namespace: engine
type: Opaque
stringData:
  redis-password: ChangeMeInProduction!
  redis-url: "redis://:ChangeMeInProduction!@redis.engine.svc.cluster.local:6379"

---
# Secret for Vault
apiVersion: v1
kind: Secret
metadata:
  name: engine-vault-secret
  namespace: engine
type: Opaque
stringData:
  vault-token: s.changemelater123456789abc
  vault-addr: "http://vault.engine.svc.cluster.local:8200"

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: engine
  namespace: engine

---
# ClusterRole for RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: engine-role
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: engine-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: engine-role
subjects:
  - kind: ServiceAccount
    name: engine
    namespace: engine

---
# NetworkPolicy - Restrict ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: engine-network-policy
  namespace: engine
spec:
  podSelector:
    matchLabels:
      app: engine
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app: engine
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 5000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: engine
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 8200
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53

---
# Deployment: tenetaiagency-101 (Python)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenetaiagency-101
  namespace: engine
  labels:
    app: engine
    service: tenetaiagency-101
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: engine
      service: tenetaiagency-101
  template:
    metadata:
      labels:
        app: engine
        service: tenetaiagency-101
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
      - name: tenetaiagency-101
        image: engine/tenetaiagency-101:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: SERVICE_NAME
          value: "tenetaiagency-101"
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: engine-config
              key: LOG_LEVEL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: engine-db-secret
              key: db-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: engine-redis-secret
              key: redis-url
        - name: VAULT_ADDR
          valueFrom:
            secretKeyRef:
              name: engine-vault-secret
              key: vault-addr
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: engine-vault-secret
              key: vault-token
        - name: JAEGER_AGENT_HOST
          value: "jaeger.engine.svc.cluster.local"
        - name: JAEGER_AGENT_PORT
          value: "6831"
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
      volumes:
      - name: tmp
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: service
                  operator: In
                  values:
                  - tenetaiagency-101
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            preference:
              matchExpressions:
              - key: workload-type
                operator: In
                values:
                - general

---
# Service: tenetaiagency-101
apiVersion: v1
kind: Service
metadata:
  name: tenetaiagency-101
  namespace: engine
  labels:
    app: engine
    service: tenetaiagency-101
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: engine
    service: tenetaiagency-101
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 300

---
# HorizontalPodAutoscaler: tenetaiagency-101
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tenetaiagency-101-hpa
  namespace: engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tenetaiagency-101
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
# PodDisruptionBudget: tenetaiagency-101
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tenetaiagency-101-pdb
  namespace: engine
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: engine
      service: tenetaiagency-101

