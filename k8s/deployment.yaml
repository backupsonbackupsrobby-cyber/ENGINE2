---
# PrometheusRule for monitoring
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: engine
data:
  rules.yml: |
    groups:
      - name: engine
        interval: 30s
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"

          - alert: PodNotReady
            expr: min by (pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) == 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is not ready"
