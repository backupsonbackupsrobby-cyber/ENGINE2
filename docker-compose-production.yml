version: '3.8'

services:
  # Prometheus - Real metrics collection
  prometheus:
    image: dhi.io/prometheus:latest
    container_name: engine-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana - Real dashboards
  grafana:
    image: dhi.io/grafana:latest
    container_name: engine-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AlertManager - Real alerting
  alertmanager:
    image: dhi.io/alertmanager:latest
    container_name: engine-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kubernetes API (optional - for K8s deployment)
  kubernetes-api:
    image: dhi.io/apiserver:latest
    container_name: engine-k8s-api
    environment:
      ETCD_SERVERS: http://etcd:2379
    depends_on:
      - etcd
    networks:
      - engine-network
    restart: unless-stopped
    profiles: ["kubernetes"]

  # ETCD - Kubernetes state store
  etcd:
    image: dhi.io/etcd:latest
    container_name: engine-etcd
    environment:
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
    volumes:
      - etcd_data:/etcd-data
    networks:
      - engine-network
    restart: unless-stopped
    profiles: ["kubernetes"]

  # Redis - Real caching
  redis:
    image: dhi.io/redis:latest
    container_name: engine-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL - Real database
  postgresql:
    image: dhi.io/postgres:latest
    container_name: engine-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-engine}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-engine}
      POSTGRES_DB: ${DB_NAME:-engine}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-engine}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Jaeger - Real distributed tracing
  jaeger:
    image: dhi.io/jaeger:latest
    container_name: engine-jaeger
    ports:
      - "16686:16686"
      - "6831:6831/udp"
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    volumes:
      - jaeger_data:/badger/data
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:14269"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Vault - Real secrets management
  vault:
    image: dhi.io/vault:latest
    container_name: engine-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-myroot}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    volumes:
      - vault_data:/vault/data
    cap_add:
      - IPC_LOCK
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8200/v1/sys/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  etcd_data:
  redis_data:
  postgres_data:
  jaeger_data:
  vault_data:

networks:
  engine-network:
    driver: bridge
