version: '3.9'

services:
  # PostgreSQL Database
  postgresql:
    image: postgres:16-alpine
    container_name: engine-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-engine_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ChangeMeInProduction!}
      POSTGRES_DB: ${DB_NAME:-engine_prod}
      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engine_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: engine-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-ChangeMeInProduction!}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: engine-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-rules.yml:/etc/prometheus/rules/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: engine-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-ChangeMeInProduction!}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AlertManager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: engine-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Jaeger
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: engine-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ':9411'
    ports:
      - "6831:6831/udp"
      - "16686:16686"
    volumes:
      - jaeger_data:/badger/data
    networks:
      - engine-network
    restart: unless-stopped

  # Vault
  vault:
    image: vault:latest
    container_name: engine-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-s.changemelater123456789abc}
      VAULT_DEV_LISTEN_ADDRESS: '0.0.0.0:8200'
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
    cap_add:
      - IPC_LOCK
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8200/v1/sys/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python API Service
  tenetaiagency-101:
    build:
      context: ./tenetaiagency-101
      dockerfile: Dockerfile
    image: engine/tenetaiagency-101:latest
    container_name: tenetaiagency-101
    environment:
      SERVICE_NAME: "tenetaiagency-101"
      ENVIRONMENT: "production"
      LOG_LEVEL: "INFO"
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: "postgresql://engine_user:${DB_PASSWORD:-ChangeMeInProduction!}@postgresql:5432/engine_prod"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-ChangeMeInProduction!}@redis:6379/0"
      VAULT_ADDR: "http://vault:8200"
      JAEGER_AGENT_HOST: "jaeger"
      JAEGER_AGENT_PORT: "6831"
    ports:
      - "8000:8000"
    depends_on:
      - postgresql
      - redis
      - vault
    volumes:
      - /tmp/tenetai:/tmp
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Node.js Service
  ultimate-engine:
    build:
      context: ./ultimate-engine
      dockerfile: Dockerfile
    image: engine/ultimate-engine:latest
    container_name: ultimate-engine
    environment:
      NODE_ENV: "production"
      SERVICE_NAME: "ultimate-engine"
      LOG_LEVEL: "info"
      DATABASE_URL: "postgresql://engine_user:${DB_PASSWORD:-ChangeMeInProduction!}@postgresql:5432/engine_prod"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-ChangeMeInProduction!}@redis:6379/1"
      VAULT_ADDR: "http://vault:8200"
      JAEGER_AGENT_HOST: "jaeger"
    ports:
      - "3000:3000"
    depends_on:
      - postgresql
      - redis
      - tenetaiagency-101
    volumes:
      - /tmp/ultimate:/tmp
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Go Service
  engine-365-days:
    build:
      context: ./engine-365-days
      dockerfile: Dockerfile
    image: engine/engine-365-days:latest
    container_name: engine-365-days
    environment:
      ENVIRONMENT: "production"
      SERVICE_NAME: "engine-365-days"
      LOG_LEVEL: "info"
      DATABASE_URL: "postgresql://engine_user:${DB_PASSWORD:-ChangeMeInProduction!}@postgresql:5432/engine_prod"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-ChangeMeInProduction!}@redis:6379/2"
      VAULT_ADDR: "http://vault:8200"
      JAEGER_AGENT_HOST: "jaeger"
    ports:
      - "8080:8080"
    depends_on:
      - postgresql
      - redis
      - ultimate-engine
    volumes:
      - /tmp/engine365:/tmp
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python Trading Service
  restricted-aichatbot-trader:
    build:
      context: ./restricted-aichatbot-trader
      dockerfile: Dockerfile
    image: engine/restricted-aichatbot-trader:latest
    container_name: restricted-aichatbot-trader
    environment:
      SERVICE_NAME: "restricted-aichatbot-trader"
      ENVIRONMENT: "production"
      LOG_LEVEL: "INFO"
      PYTHONUNBUFFERED: "1"
      TRADING_MODE: "restricted"
      DATABASE_URL: "postgresql://engine_user:${DB_PASSWORD:-ChangeMeInProduction!}@postgresql:5432/engine_prod"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-ChangeMeInProduction!}@redis:6379/3"
      VAULT_ADDR: "http://vault:8200"
      JAEGER_AGENT_HOST: "jaeger"
    ports:
      - "5000:5000"
    depends_on:
      - postgresql
      - redis
      - tenetaiagency-101
    volumes:
      - /tmp/trader:/tmp
    networks:
      - engine-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  jaeger_data:
  vault_data:

networks:
  engine-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
