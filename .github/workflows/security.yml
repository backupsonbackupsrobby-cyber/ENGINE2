name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Run dependency-check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'ENGINE'
          path: '.'
          format: 'SARIF'
          args: >
            --enable-retired
      
      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'dependency-check-report.sarif'

  secret-scan:
    name: GitGuardian Secret Scan
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Scan for secrets
        run: |
          if ! command -v ggshield &> /dev/null; then
            pip install ggshield
          fi
          ggshield secret scan repo . --verbose || true

  docker-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build images for scanning
        uses: docker/build-push-action@v7
        with:
          context: ./tenetaiagency-101
          push: false
          load: true
          tags: engine/tenetaiagency-101:scan
      
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          input: 'engine/tenetaiagency-101:scan'
          format: 'sarif'
          output: 'docker-scan-results.sarif'
      
      - name: Upload Docker scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'docker-scan-results.sarif'

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'javascript']
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4


