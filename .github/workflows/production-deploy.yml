name: Production Deployment - ENGINE

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push DHI images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/engine:latest
            ghcr.io/${{ github.repository }}/engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run security scans
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ghcr.io/${{ github.repository }}/engine:latest
          only-severities: critical,high
          exit-code: true
      
      - name: Deploy to Kubernetes
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/engine-tenetai -n engine --timeout=5m
      
      - name: Verify deployment
        run: |
          kubectl get pods -n engine
          kubectl describe deployment engine-tenetai -n engine
      
      - name: Health check
        run: |
          kubectl wait --for=condition=ready pod -l app=engine -n engine --timeout=300s
      
      - name: Run integration tests
        run: |
          kubectl exec -n engine deployment/engine-tenetai -- pytest tests/integration
      
      - name: Capture satellite state
        run: |
          ./satellite-state-verification.sh --capture
      
      - name: Create deployment attestation
        run: |
          ./satellite-state-verification.sh --attest
      
      - name: Notify deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Production deployment successful\n\nDeployed to Kubernetes cluster with 3+ replicas\nSatellite verification: PASSED\nSecurity scans: PASSED'
            })
