apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-365-days
  namespace: default
  labels:
    app: engine
    engine: 365-days
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: engine
      engine: 365-days
  template:
    metadata:
      labels:
        app: engine
        engine: 365-days
    spec:
      containers:
      - name: engine-365-days
        image: node:25.9.0-slim
        imagePullPolicy: IfNotPresent
        command: ["node", "dist/index.js"]
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "512Mi"
            cpu: "2000m"
        volumeMounts:
        - name: engine-logs
          mountPath: /app/logs
        - name: engine-data
          mountPath: /app/data
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        env:
        - name: ENGINE_NAME
          value: "engine-365-days"
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      volumes:
      - name: engine-logs
        persistentVolumeClaim:
          claimName: engine-logs-pvc
      - name: engine-data
        persistentVolumeClaim:
          claimName: engine-data-pvc
---
