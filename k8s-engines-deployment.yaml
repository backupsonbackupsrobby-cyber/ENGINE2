apiVersion: v1
kind: Service
metadata:
  name: engine-service
  namespace: default
  labels:
    app: engine
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: engine-365
  - port: 8080
    targetPort: 3001
    protocol: TCP
    name: ultimate
  - port: 8443
    targetPort: 3002
    protocol: TCP
    name: tenet
  selector:
    app: engine
